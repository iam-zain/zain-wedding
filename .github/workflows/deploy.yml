name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Build the React SPA and deploy it to Cloudflare Pages.
# Required repo secrets:  CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID, VITE_API_KEY
# Required repo variables: CF_PAGES_PROJECT, VITE_API_BASE_URL, VITE_DATA_BASE_URL, VITE_SITE_URL
# Optional (admin portal): CF_ADMIN_PROJECT
jobs:
  deploy-frontend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
          VITE_API_KEY: ${{ secrets.VITE_API_KEY }}
          VITE_DATA_BASE_URL: ${{ vars.VITE_DATA_BASE_URL }}
          VITE_SITE_URL: ${{ vars.VITE_SITE_URL }}
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy frontend/dist --project-name=${{ vars.CF_PAGES_PROJECT }} --branch=main

  # Optional: deploy the standalone admin portal to a second Pages project.
  deploy-admin:
    runs-on: ubuntu-latest
    if: ${{ vars.CF_ADMIN_PROJECT != '' }}
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4
      - name: Deploy admin to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy admin --project-name=${{ vars.CF_ADMIN_PROJECT }} --branch=main
